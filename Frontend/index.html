<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniPitch - Hệ Thống Quản Lý Sân Bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        .hero-container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hero-icon { font-size: 80px; margin-bottom: 20px; color: #f8f9fa; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .btn-start { font-size: 18px; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="hero-container" id="welcome-screen">
        <div class="hero-icon"><i class="fas fa-futbol"></i></div>
        <h1 class="fw-bold mb-3">MiniPitch Management</h1>
        <p class="fs-5 text-white-50 mb-4">Nền tảng quản lý sân bóng mini thông minh, tích hợp đặt sân, dịch vụ, kho hàng và thống kê doanh thu toàn diện.</p>
        
        <a href="auth.html" class="btn btn-light btn-lg btn-start text-primary">
            <i class="fas fa-sign-in-alt me-2"></i> Đăng nhập hệ thống
        </a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("userRole");
            
            // Nếu đã đăng nhập rồi, tự động chuyển hướng luôn không cần bấm nút
            if (role === 'manager') {
                window.location.href = 'dashboard.html';
            } else if (role === 'staff') {
                window.location.href = 'booking.html';
            }
        });
    </script>
</body>
</html>
